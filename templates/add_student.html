<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Enroll New Student | Pi Face AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

<div class="container my-5">
  <div class="card p-4 border-0 shadow-lg" style="border-radius: 15px;">
    
    <div class="mb-4 border-bottom pb-3">
      <h2 class="text-primary mb-0"><i class="bi bi-person-plus-fill me-2"></i>Student Enrollment</h2>
      <p class="text-muted small mb-0">Step 1: Save Info → Step 2: Capture Face</p>
    </div>

    <div class="row">
      <div class="col-lg-5">
        <div class="card border-0 bg-white shadow-sm p-3">
          <h5 class="fw-bold mb-3">Step 1: Student Information</h5>
          <form id="studentForm">
            <div class="mb-3">
              <label class="form-label small fw-bold">Full Name *</label>
              <input type="text" name="name" class="form-control" placeholder="Enter student name" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Class</label>
                    <input type="text" name="class" class="form-control" placeholder="e.g. 10">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Section</label>
                    <input type="text" name="section" class="form-control" placeholder="e.g. A">
                </div>
            </div>
            <button type="button" id="saveInfoBtn" class="btn btn-primary w-100 py-2">
              <i class="bi bi-check-circle me-1"></i> Save & Open Camera
            </button>
          </form>
        </div>

        <div class="card mt-3 border-0 bg-info bg-opacity-10">
          <div class="card-body small">
            <i class="bi bi-info-circle-fill me-1"></i> 
            After saving, the Pi 5 camera will capture 50 photos to create the AI model.
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card border-0 bg-dark p-2 text-center" style="min-height: 350px;">
          <div id="cameraPlaceholder" class="text-white d-flex flex-column justify-content-center" style="height: 350px;">
             <i class="bi bi-camera-video-off fs-1 opacity-50"></i>
             <p class="mt-2">Camera locked until info is saved</p>
          </div>
          
          <div id="videoSection" style="display: none;">
              <img id="video" src="" class="img-fluid rounded border border-secondary" alt="Capture Feed">
              <div class="progress mt-2" style="height: 10px;">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
              </div>
          </div>
        </div>

        <div id="captureStatus" class="mt-3 p-3 bg-white border rounded text-center fw-bold text-muted">
          Waiting for Information...
        </div>

        <div class="mt-3 d-flex gap-2">
            <button id="startCaptureBtn" class="btn btn-success flex-grow-1 py-2" disabled>
                <i class="bi bi-camera-fill me-1"></i> Start Face Scan
            </button>
            <button id="addStudentBtn" class="btn btn-outline-primary py-2" disabled>
                Done
            </button>
        </div>
      </div>
    </div>

    <div class="mt-4 pt-3 border-top">
      <a href="/" class="btn btn-sm btn-link text-decoration-none text-secondary">
        <i class="bi bi-arrow-left"></i> Cancel and Return
      </a>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
</body>
</html>
